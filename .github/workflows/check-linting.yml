# This workflow runs linting checks on pull requests

name: Check linting

on:
  pull_request:
    branches: [main, dev]

jobs:
  lint-api:
    name: api
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v2
        with:
          distribution: temurin
          java-version: 21

      - name: Run Checkstyle
        run: mvn checkstyle:check --file api/pom.xml

      - name: Run SpotBugs
        run: mvn spotbugs:check --file api/pom.xml

      - name: Run PMD
        run: mvn pmd:check --file api/pom.xml
