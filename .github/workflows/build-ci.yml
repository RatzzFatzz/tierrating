name: build ci
on:
  push:
    branches: ['dev']
env:
  REGISTRY: ghcr.io
  GITHUB_TOKEN: ${{ github.token }}
jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set lower case repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Set up JDK 21
        uses: actions/setup-java@v2
        with:
          distribution: temurin
          java-version: 21
      - name: Build with Maven
        run: mvn clean package install --file api/pom.xml
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-api
      - name: Build API Docker image
        uses: docker/build-push-action@v7
        with:
          context: api
          push: false
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          outputs: type=docker,dest=/tmp/api-image.tar
      - name: Upload API image artifact
        uses: actions/upload-artifact@v6
        with:
          name: api-image
          path: /tmp/api-image.tar
          retention-days: 1
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set lower case repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-web
      - name: Build Web Docker image
        uses: docker/build-push-action@v7
        with:
          context: web
          push: false
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          outputs: type=docker,dest=/tmp/web-image.tar
      - name: Upload Web image artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-image
          path: /tmp/web-image.tar
          retention-days: 1
  push-images:
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set lower case repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Auth Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ env.GITHUB_TOKEN }}
      - name: Download API image artifact
        uses: actions/download-artifact@v4
        with:
          name: api-image
          path: /tmp
      - name: Download Web image artifact
        uses: actions/download-artifact@v4
        with:
          name: web-image
          path: /tmp
      - name: Load and push API image
        run: |
          docker load --input /tmp/api-image.tar
          docker push --all-tags ${{ env.REGISTRY }}/${{ env.REPO_LC }}-api
      - name: Load and push Web image
        run: |
          docker load --input /tmp/web-image.tar
          docker push --all-tags ${{ env.REGISTRY }}/${{ env.REPO_LC }}-web