spring:

  datasource:
    url: jdbc:postgresql://localhost:5433/tierrating
    driver-class-name: org.postgresql.Driver
    username: tierrating
    password: ${DB_PASSWORD:testingPW}

  jpa:
    hibernate:
      ddl-auto: update

  sql:
    init:
      mode: never

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:dev-secret-key-change-in-production}
    expiration-time: ${JWT_EXPIRATION_TIME:3600000}

server:
  servlet:
    context-path: "/api"

sync:
  interval: "0 0 */4 * * *"

