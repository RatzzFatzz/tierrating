spring:

  datasource:
    url: jdbc:postgresql://localhost:5433/tierrating
    driver-class-name: org.postgresql.Driver
    username: tierrating
    password: ${DB_PASSWORD:testingPW}

  jpa:
    hibernate:
      ddl-auto: update

  sql:
    init:
      mode: never

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:dev-secret-key-change-in-production}
    expiration-time: ${JWT_EXPIRATION_TIME:3600000}

services:
  anilist:
    client:
      key: ${ANILIST_CLIENT_KEY:}
      secret: ${ANILIST_CLIENT_SECRET:}
    url: ${ANILIST_REDIRECT_URL:}
  trakt:
    client:
      key: ${TRAKT_CLIENT_KEY:}
      secret: ${TRAKT_CLIENT_SECRET:}
    url: ${TRAKT_REDIRECT_URL:}
tmdb:
  api:
    key: ${TMDB_API_KEY:}