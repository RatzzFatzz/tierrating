spring:

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/tierrating
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  sql:
    init:
      mode: never

security:
  jwt:
    # JWT secret key - MUST be changed in production!
    # Use a strong, random string of at least 256 bits
    secret-key: ${SECRET_KEY:please-change-this-secret-key-in-production}
    # Token expiration in minutes (default: 60 minutes = 1 hour)
    # Consider implementing refresh token rotation for better security:
    # - Short-lived access tokens (15-30 min) + long-lived refresh tokens
    # - Refresh tokens should be rotated on each use and stored securely
    # - See: https://auth0.com/blog/refresh-tokens-what-are-they-and-when-to-use-them/
    expiration-minutes: ${TOKEN_EXPIRATION:60}

server:
  servlet:
    context-path: "/api"

sync:
  interval: ${SYNC_INTERVAL:0 0 */4 * * *}

services:
  anilist:
    key: ${ANILIST_CLIENT_KEY:}
    secret: ${ANILIST_CLIENT_SECRET:}
    redirectUrl: ${ANILIST_REDIRECT_URL:}
  trakt:
    key: ${TRAKT_CLIENT_KEY:}
    secret: ${TRAKT_CLIENT_SECRET:}
    redirectUrl: ${TRAKT_REDIRECT_URL:}
  steam:
    key: ${STEAM_API_KEY}
  tmdb:
    key: ${TMDB_API_KEY:}